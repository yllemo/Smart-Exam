<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <rect width="420" height="220" rx="10" fill="#1e1e1e"/>

  <!-- Connections -->
  <line x1="90"  y1="80"  x2="200" y2="80"  stroke="#444" stroke-width="1.5"/>
  <line x1="90"  y1="80"  x2="90"  y2="145" stroke="#444" stroke-width="1.5"/>
  <line x1="200" y1="80"  x2="330" y2="80"  stroke="#444" stroke-width="1.5"/>
  <line x1="200" y1="80"  x2="200" y2="145" stroke="#444" stroke-width="1.5"/>
  <line x1="330" y1="80"  x2="330" y2="145" stroke="#444" stroke-width="1.5"/>

  <!-- Nodes -->
  <circle cx="90"  cy="80"  r="7" fill="#e74c3c"/>
  <circle cx="200" cy="80"  r="7" fill="#e74c3c"/>
  <circle cx="330" cy="80"  r="7" fill="#e74c3c"/>
  <circle cx="90"  cy="145" r="7" fill="#03dac6"/>
  <circle cx="200" cy="145" r="7" fill="#03dac6"/>
  <circle cx="330" cy="145" r="7" fill="#03dac6"/>

  <!-- Labels -->
  <text x="90"  y="62"  text-anchor="middle" fill="#e0e0e0" font-family="Arial" font-size="12">London</text>
  <text x="200" y="62"  text-anchor="middle" fill="#e0e0e0" font-family="Arial" font-size="12">Paris</text>
  <text x="330" y="62"  text-anchor="middle" fill="#e0e0e0" font-family="Arial" font-size="12">Berlin</text>
  <text x="90"  y="168" text-anchor="middle" fill="#b0b0b0" font-family="Arial" font-size="11">UK</text>
  <text x="200" y="168" text-anchor="middle" fill="#b0b0b0" font-family="Arial" font-size="11">France</text>
  <text x="330" y="168" text-anchor="middle" fill="#b0b0b0" font-family="Arial" font-size="11">Germany</text>

  <text x="210" y="205" text-anchor="middle" fill="#555" font-family="Arial" font-size="11">European Capitals</text>
</svg>
